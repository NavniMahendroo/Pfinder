services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    image: sra-postgres-local:16
    container_name: sra-postgres
    environment:
      POSTGRES_DB: sra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: sra-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: sra-api
    env_file:
      - ../../.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    container_name: sra-worker
    env_file:
      - ../../.env
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
